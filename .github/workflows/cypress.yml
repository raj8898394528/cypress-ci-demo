name: Cypress CI

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false                        # 🔧 Don't cancel sibling on failure
      matrix:
        suite: [smoke, regression]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check Cypress version
        run: npx cypress version

      - name: Run Cypress tests
        run: |
          npx cypress run \
          --browser electron \
          --spec "cypress/e2e/${{ matrix.suite }}/**/*" \
          --reporter mochawesome \
          --reporter-options "reportDir=reports/${{ matrix.suite }},overwrite=false,html=false,json=true"

      - name: Upload report artifact
        if: always()                          # 🔧 Upload even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.suite }}
          path: reports/${{ matrix.suite }}
          retention-days: 7                   # 🔧 Explicit retention

  merge-reports:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()                              # 🔧 Run even if cypress-run failed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Merge Mochawesome reports
        run: |
          npx mochawesome-merge "reports/**/*.json" > merged-report.json   # 🔧 Fixed glob

      - name: Generate HTML report
        run: |
          npx marge merged-report.json --reportDir final-report --inline   # 🔧 Self-contained HTML

      - name: Upload final HTML report
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: final-report
          retention-days: 7