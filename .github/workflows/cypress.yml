name: Cypress CI

on:
  push:
    branches: [ main ]

jobs:
  # ============================================================
  # STEP 1: Discover specs and split into chunks
  # ============================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.chunk-specs.outputs.chunks }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Chunk spec files
        id: chunk-specs
        env:
          PARALLEL_JOBS: 4
        run: |
          # ✅ No -maxdepth — searches recursively through all subfolders
          SPECS=$(find cypress/e2e \( -name "*.cy.js" -o -name "*.spec.js" \) \
            | sort \
            | jq -R . \
            | jq -sc .)

          TOTAL=$(echo $SPECS | jq 'length')
          echo "Found $TOTAL spec files"

          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ No spec files found in cypress/e2e. Exiting."
            exit 1
          fi

          CHUNKS=$(echo $SPECS | jq -c --argjson n "$PARALLEL_JOBS" '
            . as $all |
            [range($n)] |
            map(
              . as $i |
              [$all | to_entries[] | select(.key % $n == $i) | .value]
            ) |
            map(select(length > 0))
          ')

          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT
          echo "Generated chunks: $CHUNKS"

  # ============================================================
  # STEP 2: Run tests in parallel chunks
  # ============================================================
  cypress-run:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.setup.outputs.chunks) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Print specs in this chunk
        run: |
          echo "Running chunk ${{ strategy.job-index }}"
          echo "Specs: ${{ join(matrix.chunk, ', ') }}"

      - name: Run Cypress tests
        run: |
          npx cypress run \
          --browser electron \
          --spec "${{ join(matrix.chunk, ',') }}" \
          --reporter mochawesome \
          --reporter-options "reportDir=reports/chunk-${{ strategy.job-index }},overwrite=false,html=false,json=true"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-chunk-${{ strategy.job-index }}
          path: reports/chunk-${{ strategy.job-index }}
          retention-days: 7

  # ============================================================
  # STEP 3: Merge all reports and generate HTML
  # ============================================================
  merge-reports:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: List downloaded files
        if: runner.debug == '1'
        run: ls -R reports

      - name: Merge Mochawesome reports
        run: |
          npx mochawesome-merge "reports/**/*.json" > merged-report.json

      - name: Generate HTML report
        run: |
          npx marge merged-report.json --reportDir final-report --inline

      - name: Upload final HTML report
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: final-report
          retention-days: 7