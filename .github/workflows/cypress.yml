name: Cypress CI

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        suite: [smoke, regression]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check Cypress version
        run: npx cypress version

      - name: Run Cypress tests
        run: |
          npx cypress run \
          --spec "cypress/e2e/${{ matrix.suite }}/**/*" \
          --reporter mochawesome \
          --reporter-options "reportDir=reports/${{ matrix.suite }},overwrite=false,html=false,json=true"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.suite }}
          path: reports/${{ matrix.suite }}