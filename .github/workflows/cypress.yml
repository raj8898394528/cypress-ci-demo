name: Cypress CI

on:
  push:
    branches: [ main ]

jobs:
  # 🔹 STEP 1: Discover suites dynamically
  setup:
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.find-suites.outputs.suites }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover test suites
        id: find-suites
        run: |
          # Find all direct subdirectories under cypress/e2e/
          SUITES=$(find cypress/e2e -mindepth 1 -maxdepth 1 -type d \
            | xargs -I{} basename {} \
            | jq -R . \
            | jq -sc .)
          echo "suites=$SUITES" >> $GITHUB_OUTPUT
          echo "Discovered suites: $SUITES"

  # 🔹 STEP 2: Run tests - matrix built from setup output
  cypress-run:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.setup.outputs.suites) }}  # 🔑 Dynamic matrix
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: |
          npx cypress run \
          --browser electron \
          --spec "cypress/e2e/${{ matrix.suite }}/**/*" \
          --reporter mochawesome \
          --reporter-options "reportDir=reports/${{ matrix.suite }},overwrite=false,html=false,json=true"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.suite }}
          path: reports/${{ matrix.suite }}
          retention-days: 7

  # 🔹 STEP 3: Merge + generate HTML (unchanged)
  merge-reports:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Merge Mochawesome reports
        run: |
          npx mochawesome-merge "reports/**/*.json" > merged-report.json

      - name: Generate HTML report
        run: |
          npx marge merged-report.json --reportDir final-report --inline

      - name: Upload final HTML report
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: final-report
          retention-days: 7